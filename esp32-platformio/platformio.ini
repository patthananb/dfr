; PlatformIO Project Configuration File — DFR ESP32 client
;
; Mirrors esp32/esp32.ino but built with the PlatformIO toolchain.
; Pinned to platform 6.x (Arduino-ESP32 v2.0.x) so the legacy
; timerBegin/timerAlarmWrite API used by setupAdc() keeps compiling.
; If you bump to platform 53+ (Arduino-ESP32 v3.x) you must rewrite
; the timer block in src/main.cpp to use the new timerAlarm() API.
;
; Docs: https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform        = espressif32 @ ^6.9.0
board           = esp32dev
framework       = arduino

monitor_speed   = 115200
upload_speed    = 921600

; Build flags
;   -DCORE_DEBUG_LEVEL=1 → enable ARDUHAL_LOG_LEVEL_ERROR (0=none, 5=verbose)
build_flags =
    -DCORE_DEBUG_LEVEL=1

; Library dependencies — WiFi/HTTPClient/Update/mbedtls ship with the
; Arduino-ESP32 core, so only ArduinoJson needs to be declared here.
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
